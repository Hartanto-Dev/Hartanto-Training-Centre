<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Sederhana</title>
  <!-- Hubungkan file CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- CARD 1: dengan gambar -->
  <div class="card">
    <img
      class="card-image"
      src="https://picsum.photos/seed/1/400/200"
      alt="Gambar card"
    />
    <div class="card-body">
      <h3 class="card-title">Judul Card</h3>
      <p class="card-text">
        Ini adalah deskripsi singkat dari card. Kamu bisa mengganti
        teks ini dengan konten apa pun yang kamu mau.
      </p>
      <!-- Tombol dengan id untuk JS -->
      <button class="card-button" id="btnCard1">Klik Saya</button>
    </div>
  </div>

  <!-- CARD 2: tanpa gambar + footer -->
  <div class="card" style="margin-left: 24px;">
    <div class="card-body">
      <h3 class="card-title">Card Tanpa Gambar</h3>
      <p class="card-text">
        Card ini tidak memiliki gambar, cocok untuk konten teks murni.
        Kamu bisa menambahkan elemen lain di sini.
      </p>
      <button class="card-button" id="btnCard2">Lihat Detail</button>
    </div>
    <div class="card-footer">
      Diposting 2 jam yang lalu
    </div>
  </div>

  <!-- Hubungkan file JavaScript -->
  <script src="script.js"></script>
</body>
</html>
